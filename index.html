<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NWU Student Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nwu-purple:   #6b0f8e;
      --nwu-purple-d: #4a0a64;
      --nwu-purple-l: #8c2dae;
      --accent:       #1976d2;
      --accent-hover: #1255a1;
      --text-main:    #1a1a2e;
      --text-muted:   #555;
      --border:       #ccc;
      --border-focus: #6b0f8e;
      --border-error: #c0392b;
      --bg:           #f5f4f8;
      --card-bg:      #ffffff;
      --error:        #c0392b;
      --success:      #1e7e34;
      --radius:       8px;
      --shadow:       0 4px 24px rgba(107,15,142,.12);
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text-main);
    }

    header {
      background: linear-gradient(135deg, var(--nwu-purple-d) 0%, var(--nwu-purple) 60%, var(--nwu-purple-l) 100%);
      padding: 22px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    }

    .logo-mark { width: 56px; height: 56px; flex-shrink: 0; }

    .logo-text {
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
    }

    .logo-registered { font-size: 0.65rem; vertical-align: super; }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 16px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 440px;
      border-top: 4px solid var(--nwu-purple);
      animation: slideUp 0.4s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--nwu-purple-d);
    }

    .card .subtitle {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 6px;
      color: var(--text-main);
    }

    .required { color: var(--error); margin-left: 2px; }

    .input-wrap { position: relative; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.95rem;
      color: var(--text-main);
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(107,15,142,.13);
      background: #fff;
    }

    input.error-input {
      border-color: var(--border-error);
      box-shadow: 0 0 0 3px rgba(192,57,43,.12);
    }

    .toggle-pin {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 2px 4px;
      user-select: none;
    }

    .toggle-pin:hover { color: var(--nwu-purple); }

    /* Error & alert messages */
    .field-error {
      color: var(--error);
      font-size: 0.8rem;
      margin-top: 5px;
      display: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.88rem;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
      font-weight: 500;
    }

    .alert-error {
      background: #fdecea;
      border: 1.5px solid #f5c6c2;
      color: var(--error);
    }

    .alert.visible { display: flex; }

    .links {
      margin: 20px 0 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .links a {
      color: var(--accent);
      font-size: 0.88rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover {
      color: var(--accent-hover);
      text-decoration: underline;
    }

    .btn-row { display: flex; gap: 12px; }

    .btn {
      padding: 11px 28px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-cancel {
      background: #fff;
      color: var(--text-main);
      border: 1.5px solid var(--border);
    }

    .btn-cancel:hover { background: #f0f0f0; }

    .btn-login {
      background: var(--accent);
      color: #fff;
      flex: 1;
      box-shadow: 0 2px 8px rgba(25,118,210,.25);
    }

    .btn-login:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 14px rgba(25,118,210,.35);
    }

    .btn-login:disabled {
      background: #90b8e0;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Spinner inside button */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 18px;
      font-size: 0.78rem;
      color: var(--text-muted);
      border-top: 1px solid #e0e0e0;
    }

    @media (max-width: 480px) {
      .card { padding: 28px 20px 24px; }
      .card h1 { font-size: 1.35rem; }
    }
  </style>
</head>
<body>

  <header>
    <svg class="logo-mark" viewBox="0 0 56 56" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="28" cy="28" r="26" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <path d="M10 16 Q10 36 22 36 Q34 36 34 28 Q34 20 26 20 Q20 20 20 26 Q20 32 26 32"
            fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <path d="M22 20 Q22 40 34 40 Q46 40 46 28"
            fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    </svg>
    <div>
      <div class="logo-text">NWU<span class="logo-registered">®</span></div>
    </div>
  </header>

  <main>
    <div class="card">
      <h1>Login</h1>
      <p class="subtitle">Log in with your 8-digit student number and PIN you created:</p>

      <!-- Error banner -->
      <div class="alert alert-error" id="alertBox" role="alert">
        <span>⚠</span>
        <span id="alertMsg">Invalid student number or PIN. Please try again.</span>
      </div>

      <form id="loginForm" novalidate>

        <div class="form-group">
          <label for="studentNumber">
            University Number<span class="required" aria-label="required">✱</span>
          </label>
          <input
            type="text"
            id="studentNumber"
            name="studentNumber"
            placeholder="e.g. 12345678"
            maxlength="8"
            autocomplete="username"
          />
          <div class="field-error" id="numError">Please enter your 8-digit university number.</div>
        </div>

        <div class="form-group">
          <label for="pin">
            PIN<span class="required" aria-label="required">✱</span>
          </label>
          <div class="input-wrap">
            <input
              type="password"
              id="pin"
              name="pin"
              placeholder="Enter your PIN"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-pin" id="togglePin" aria-label="Show/hide PIN">Show</button>
          </div>
          <div class="field-error" id="pinError">Please enter your PIN.</div>
        </div>

        <div class="links">
          <a href="#">PIN Forgotten</a>
          <a href="#">Create new University Number</a>
          <a href="#">Create PIN</a>
        </div>

        <div class="btn-row">
          <button type="button" class="btn btn-cancel" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn btn-login" id="loginBtn">Login</button>
        </div>

      </form>
    </div>
  </main>

  <footer>
    &copy; 2025 North-West University. All rights reserved.
  </footer>

  <script>
    // ── DUMMY CREDENTIALS (stored in localStorage on page load) ──────────
    const VALID_USERS = [
      {
        studentNumber: '56635672',
        pin:           'Olerato@08',
        fullName:      'Olerato Primrose Nhlapo',
        firstName:     'Olerato',
        email:         'olerato.nhlapo@student.nwu.ac.za'
      }
    ];

    // Persist dummy user data to localStorage so it can be read on landing page
    if (!localStorage.getItem('nwu_users')) {
      localStorage.setItem('nwu_users', JSON.stringify(VALID_USERS));
    }

    // ── DOM REFS ─────────────────────────────────────────────────────────
    const form       = document.getElementById('loginForm');
    const numInput   = document.getElementById('studentNumber');
    const pinInput   = document.getElementById('pin');
    const numError   = document.getElementById('numError');
    const pinError   = document.getElementById('pinError');
    const alertBox   = document.getElementById('alertBox');
    const alertMsg   = document.getElementById('alertMsg');
    const loginBtn   = document.getElementById('loginBtn');
    const cancelBtn  = document.getElementById('cancelBtn');
    const togglePin  = document.getElementById('togglePin');

    // ── SHOW / HIDE PIN ──────────────────────────────────────────────────
    togglePin.addEventListener('click', () => {
      const isPassword = pinInput.type === 'password';
      pinInput.type    = isPassword ? 'text' : 'password';
      togglePin.textContent = isPassword ? 'Hide' : 'Show';
    });

    // ── CLEAR FIELD ERRORS ON INPUT ──────────────────────────────────────
    numInput.addEventListener('input', () => clearFieldError(numInput, numError));
    pinInput.addEventListener('input', () => clearFieldError(pinInput, pinError));

    function clearFieldError(input, errorEl) {
      input.classList.remove('error-input');
      errorEl.style.display = 'none';
      alertBox.classList.remove('visible');
    }

    // ── CANCEL ───────────────────────────────────────────────────────────
    cancelBtn.addEventListener('click', () => {
      numInput.value = '';
      pinInput.value = '';
      numInput.classList.remove('error-input');
      pinInput.classList.remove('error-input');
      numError.style.display = 'none';
      pinError.style.display = 'none';
      alertBox.classList.remove('visible');
      numInput.focus();
    });

    // ── FORM SUBMIT ──────────────────────────────────────────────────────
    form.addEventListener('submit', function(e) {
      e.preventDefault();

      const num = numInput.value.trim();
      const pin = pinInput.value.trim();
      let valid = true;

      // Field-level validation
      if (!num || num.length !== 8 || !/^\d{8}$/.test(num)) {
        numInput.classList.add('error-input');
        numError.style.display = 'block';
        valid = false;
      }

      if (!pin) {
        pinInput.classList.add('error-input');
        pinError.style.display = 'block';
        valid = false;
      }

      if (!valid) return;

      // Simulate loading
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span>Verifying…';

      setTimeout(() => {
        const users = JSON.parse(localStorage.getItem('nwu_users') || '[]');
        const match = users.find(u => u.studentNumber === num && u.pin === pin);

        if (match) {
          // Save logged-in user to localStorage
          localStorage.setItem('nwu_session', JSON.stringify({
            studentNumber: match.studentNumber,
            fullName:      match.fullName,
            firstName:     match.firstName,
            email:         match.email,
            loginTime:     new Date().toISOString()
          }));

          // Redirect to landing page
          window.location.href = 'nwu-landing.html';
        } else {
          // Invalid credentials
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';

          numInput.classList.add('error-input');
          pinInput.classList.add('error-input');
          alertMsg.textContent = 'Incorrect student number or PIN. Please try again.';
          alertBox.classList.add('visible');
          pinInput.value = '';
          pinInput.focus();
        }
      }, 1000); // 1-second simulated network delay
    });
  </script>

</body>
</html>
